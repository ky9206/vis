<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vamshi Chandanam | Interactive Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --gold: #c9a84c;
            --gold-light: #e8c97a;
            --cream: #f5f0e8;
            --deep: #0a0a12;
            --mid: #12121e;
            --glass-bg: rgba(255,255,255,0.06);
            --glass-border: rgba(255,255,255,0.14);
            --glass-blur: blur(24px);
        }

        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            background: var(--deep);
            height: 100vh;
            width: 100vw;
        }

        /* === BACKGROUND LAYERS === */
        .bg-base {
            position: fixed; inset: 0;
            background: radial-gradient(ellipse 120% 80% at 60% 40%, #1a1030 0%, #0a0a12 60%, #000 100%);
            z-index: 0;
        }

        .bg-aurora {
            position: fixed; inset: 0;
            z-index: 1;
            opacity: 0.4;
            background:
                radial-gradient(ellipse 60% 40% at 20% 30%, rgba(102,60,200,0.35) 0%, transparent 60%),
                radial-gradient(ellipse 50% 35% at 80% 70%, rgba(200,80,120,0.25) 0%, transparent 60%),
                radial-gradient(ellipse 70% 50% at 50% 90%, rgba(40,100,220,0.2) 0%, transparent 60%);
            animation: auroraShift 12s ease-in-out infinite alternate;
        }

        @keyframes auroraShift {
            from { transform: scale(1) rotate(0deg); }
            to { transform: scale(1.1) rotate(2deg); }
        }

        .bg-grid {
            position: fixed; inset: 0;
            z-index: 2;
            opacity: 0.04;
            background-image:
                linear-gradient(rgba(255,255,255,1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,1) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        /* === BACKGROUND REVEAL PANELS (the 3 end cards) === */
        .bg-panel {
            position: fixed;
            z-index: 3;
            overflow: hidden;
            transition: filter 1.2s cubic-bezier(0.4,0,0.2,1), opacity 1.2s ease, transform 1.2s cubic-bezier(0.4,0,0.2,1);
            filter: blur(40px) brightness(0.3) saturate(0.4);
            opacity: 0.15;
        }

        .bg-panel.unblurred {
            filter: blur(0px) brightness(1) saturate(1);
            opacity: 1;
        }

        /* Panel 1: full screen */
        .bg-panel-1 {
            inset: 0;
            border-radius: 0;
        }

        /* Panel 2: centered, slightly smaller — visible after swipe 2 */
        .bg-panel-2 {
            top: 5vh; left: 5vw; right: 5vw; bottom: 5vh;
            border-radius: 24px;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.1), 0 40px 120px rgba(0,0,0,0.8);
        }

        /* Panel 3: even smaller — visible after swipe 3 */
        .bg-panel-3 {
            top: 12vh; left: 10vw; right: 10vw; bottom: 12vh;
            border-radius: 32px;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.12), 0 30px 80px rgba(0,0,0,0.7);
        }

        .bg-panel img, .bg-panel video {
            width: 100%; height: 100%;
            object-fit: cover;
        }

        /* === INTRO SCREEN === */
        .intro-screen {
            position: fixed; inset: 0;
            z-index: 200;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 1s ease, visibility 1s ease;
        }

        .intro-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .intro-bg {
            position: absolute; inset: 0;
            background: radial-gradient(ellipse 100% 100% at 50% 50%, #12102a 0%, #080810 70%, #000 100%);
        }

        .intro-particles {
            position: absolute; inset: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: particleFloat linear infinite;
            opacity: 0;
        }

        @keyframes particleFloat {
            0%   { transform: translateY(100vh) translateX(0) scale(0); opacity: 0; }
            5%   { opacity: 1; }
            95%  { opacity: 0.6; }
            100% { transform: translateY(-20vh) translateX(var(--drift)) scale(1.2); opacity: 0; }
        }

        .intro-content {
            position: relative;
            z-index: 1;
            text-align: center;
            animation: introReveal 1.4s cubic-bezier(0.16,1,0.3,1) forwards;
        }

        @keyframes introReveal {
            0%  { transform: scale(0.7) translateY(40px); opacity: 0; filter: blur(20px); }
            60% { filter: blur(0); }
            100%{ transform: scale(1) translateY(0); opacity: 1; filter: blur(0); }
        }

        .intro-eyebrow {
            font-size: clamp(0.65rem, 1.5vw, 0.8rem);
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.5s forwards;
        }

        .intro-name {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 9vw, 6.5rem);
            font-weight: 700;
            line-height: 1.05;
            letter-spacing: -0.01em;
            background: linear-gradient(135deg, #fff 0%, #e8d9ff 30%, var(--gold-light) 60%, #fff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            background-size: 200% 200%;
            animation: shimmer 4s ease infinite;
        }

        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .intro-tagline {
            margin-top: 16px;
            font-size: clamp(0.85rem, 2vw, 1rem);
            font-weight: 300;
            color: rgba(255,255,255,0.5);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.8s forwards;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
            from { opacity: 0; transform: translateY(12px); }
        }

        .intro-divider {
            width: 60px; height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 28px auto;
            opacity: 0;
            animation: fadeUp 0.8s ease 1s forwards;
        }

        .intro-cta {
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.35);
            opacity: 0;
            animation: fadeUp 0.8s ease 1.2s forwards, ctaPulse 3s ease 2s infinite;
        }

        @keyframes ctaPulse {
            0%, 100% { color: rgba(255,255,255,0.35); }
            50% { color: rgba(255,255,255,0.7); }
        }

        .intro-cta-arrow {
            display: block;
            margin-top: 10px;
            font-size: 1.2rem;
            animation: arrowBounce 1.5s ease infinite;
        }

        @keyframes arrowBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(8px); }
        }

        /* === MAIN LAYOUT === */
        .scene {
            position: fixed; inset: 0;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .scene.active { pointer-events: all; }

        /* === CARD STACK === */
        .card-stage {
            position: relative;
            width: min(88vw, 580px);
            height: min(82vh, 720px);
            perspective: 1200px;
        }

        .card {
            position: absolute; inset: 0;
            border-radius: 28px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 36px;
            cursor: grab;
            user-select: none;
            will-change: transform, opacity;
            transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s ease, box-shadow 0.35s ease;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 28px;
            background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, transparent 50%, rgba(255,255,255,0.03) 100%);
            pointer-events: none;
        }

        .card:active { cursor: grabbing; }

        .card.inactive {
            opacity: 0;
            pointer-events: none;
        }

        .card.active {
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.12),
                0 30px 80px rgba(0,0,0,0.6),
                0 0 60px rgba(140,100,255,0.1);
        }

        .card.slide-left {
            transform: translateX(-110%) rotate(-8deg) scale(0.9);
            opacity: 0;
        }

        .card.slide-right {
            transform: translateX(110%) rotate(8deg) scale(0.9);
            opacity: 0;
        }

        /* Card enter animation */
        @keyframes cardEnter {
            from { transform: translateX(60px) scale(0.95); opacity: 0; }
            to   { transform: translateX(0) scale(1); opacity: 1; }
        }

        @keyframes cardEnterLeft {
            from { transform: translateX(-60px) scale(0.95); opacity: 0; }
            to   { transform: translateX(0) scale(1); opacity: 1; }
        }

        .card.entering-right { animation: cardEnter 0.45s cubic-bezier(0.4,0,0.2,1) forwards; }
        .card.entering-left  { animation: cardEnterLeft 0.45s cubic-bezier(0.4,0,0.2,1) forwards; }

        /* === IMAGE CARD === */
        .card-img-wrap {
            width: 100%; height: 100%;
            position: relative;
            border-radius: 18px;
            overflow: hidden;
        }

        .card-img-frame {
            position: absolute; inset: 0;
            padding: 10px;
            background: linear-gradient(145deg, rgba(255,255,255,0.95), rgba(240,235,255,0.9));
            border-radius: 18px;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.8),
                inset 0 1px 2px rgba(255,255,255,0.9);
        }

        .card-img-frame::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 20px;
            background: conic-gradient(from 0deg, #667eea, #a855f7, var(--gold), #ec4899, #667eea);
            z-index: -1;
            animation: spinGradient 4s linear infinite;
        }

        @keyframes spinGradient {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        .card-img-frame img {
            width: 100%; height: 100%;
            object-fit: contain;
            border-radius: 10px;
            display: block;
        }

        /* === QUOTE CARD === */
        .card-quote-inner {
            width: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        .quote-mark-top {
            font-family: 'Playfair Display', serif;
            font-size: 7rem;
            line-height: 0.5;
            color: var(--gold);
            opacity: 0.3;
            margin-bottom: 10px;
            display: block;
        }

        .card-quote-text {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.15rem, 3.5vw, 1.6rem);
            font-weight: 400;
            font-style: italic;
            color: rgba(255,255,255,0.92);
            line-height: 1.55;
            letter-spacing: 0.01em;
        }

        .card-quote-divider {
            width: 48px; height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 24px auto;
        }

        .card-quote-author {
            font-size: clamp(0.75rem, 2vw, 0.9rem);
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--gold);
        }

        /* === VIDEO CARD === */
        .card-video-wrap {
            width: 100%; height: 100%;
            position: relative;
            border-radius: 18px;
            overflow: hidden;
        }

        .card-video-wrap video {
            width: 100%; height: 100%;
            object-fit: cover;
            border-radius: 18px;
        }

        .video-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 40%);
            border-radius: 18px;
            pointer-events: none;
        }

        .video-label {
            position: absolute;
            bottom: 16px; left: 0; right: 0;
            text-align: center;
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.6);
            pointer-events: none;
        }

        .mute-btn {
            position: absolute;
            top: 14px; right: 14px;
            width: 36px; height: 36px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            color: #fff;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            transition: background 0.2s, transform 0.2s;
        }

        .mute-btn:hover { background: rgba(0,0,0,0.75); transform: scale(1.08); }

        /* === END REVEAL CARDS === */
        .reveal-card {
            position: fixed;
            z-index: 15;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 32px;
            cursor: grab;
            overflow: hidden;
            transition: all 0.6s cubic-bezier(0.4,0,0.2,1);
            opacity: 0;
            pointer-events: none;
        }

        .reveal-card.visible {
            opacity: 1;
            pointer-events: all;
        }

        .reveal-card.slide-out-left {
            transform: translateX(-110%) rotate(-5deg);
            opacity: 0;
        }

        .reveal-card.slide-out-right {
            transform: translateX(110%) rotate(5deg);
            opacity: 0;
        }

        /* Reveal card 1: fills the entire screen */
        .reveal-card-1 {
            inset: 0;
            border-radius: 0;
        }

        /* Reveal card 2: slightly inset */
        .reveal-card-2 {
            top: 4vh; left: 4vw; right: 4vw; bottom: 4vh;
            border-radius: 24px;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.12), 0 40px 120px rgba(0,0,0,0.7);
        }

        /* Reveal card 3: more inset */
        .reveal-card-3 {
            top: 11vh; left: 9vw; right: 9vw; bottom: 11vh;
            border-radius: 32px;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.15), 0 30px 80px rgba(0,0,0,0.6);
        }

        .reveal-card img, .reveal-card video {
            position: absolute;
            inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }

        .reveal-card-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 45%);
            pointer-events: none;
            z-index: 1;
        }

        .reveal-card-label {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .reveal-card-label p {
            font-size: 0.7rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
            margin-bottom: 8px;
        }

        .reveal-card-label h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.4rem, 4vw, 2.2rem);
            font-weight: 600;
            color: #fff;
            text-shadow: 0 2px 20px rgba(0,0,0,0.5);
        }

        /* Nav hint overlaid on reveal cards */
        .reveal-nav-hint {
            position: absolute;
            z-index: 10;
            bottom: 28px;
            width: 100%;
            text-align: center;
            font-size: 0.72rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            pointer-events: none;
            animation: hintPulse 2.5s ease infinite;
        }

        @keyframes hintPulse {
            0%,100%{ opacity: 0.4; }
            50%{ opacity: 0.85; }
        }

        /* === PROGRESS === */
        .progress-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 2px;
            background: rgba(255,255,255,0.06);
            z-index: 50;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, var(--gold), #ec4899);
            transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
            border-radius: 2px;
        }

        .progress-dots {
            position: fixed;
            bottom: 14px; left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 50;
        }

        .dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: rgba(255,255,255,0.22);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .dot.done { background: rgba(255,255,255,0.5); }

        .dot.now {
            background: var(--gold);
            width: 18px;
            border-radius: 3px;
            box-shadow: 0 0 8px rgba(201,168,76,0.7);
        }

        /* === NAV ARROWS === */
        .nav-arrow {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            z-index: 50;
            width: 44px; height: 44px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            color: rgba(255,255,255,0.6);
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            opacity: 0;
            pointer-events: none;
        }

        .nav-arrow.show { opacity: 1; pointer-events: all; }
        .nav-arrow:hover { background: rgba(255,255,255,0.12); color: #fff; transform: translateY(-50%) scale(1.05); }
        .nav-arrow-left  { left: 16px; }
        .nav-arrow-right { right: 16px; }

        /* === CARD INDEX LABEL === */
        .card-index {
            position: fixed;
            top: 20px; right: 20px;
            z-index: 50;
            font-size: 0.72rem;
            letter-spacing: 0.18em;
            color: rgba(255,255,255,0.3);
            opacity: 0;
            transition: opacity 0.4s;
        }

        .card-index.show { opacity: 1; }

        /* === SWIPE HINT === */
        .swipe-hint {
            position: fixed;
            bottom: 42px; left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            font-size: 0.72rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }

        .swipe-hint.show { opacity: 1; animation: hintPulse 2.5s ease infinite; }

        /* === RESPONSIVE === */
        @media (max-width: 640px) {
            .card { padding: 24px; border-radius: 22px; }
            .card-stage {
                width: 92vw;
                height: 76vh;
            }
            .nav-arrow { display: none; }
        }
    </style>
</head>
<body>

    <!-- Background layers -->
    <div class="bg-base"></div>
    <div class="bg-aurora"></div>
    <div class="bg-grid"></div>

    <!-- The 3 background reveal panels (blurred until end) -->
    <div class="bg-panel bg-panel-1" id="bgPanel1">
        <!-- filled by JS: a full-bleed image or video -->
    </div>
    <div class="bg-panel bg-panel-2" id="bgPanel2">
        <!-- filled by JS -->
    </div>
    <div class="bg-panel bg-panel-3" id="bgPanel3">
        <!-- filled by JS -->
    </div>

    <!-- Intro Screen -->
    <div class="intro-screen" id="introScreen">
        <div class="intro-bg"></div>
        <div class="intro-particles" id="introParticles"></div>
        <div class="intro-content">
            <p class="intro-eyebrow">A tribute to</p>
            <h1 class="intro-name">Vamshi Chandanam</h1>
            <p class="intro-tagline">An Interactive Experience</p>
            <div class="intro-divider"></div>
            <p class="intro-cta">
                Tap anywhere to begin
                <span class="intro-cta-arrow">↓</span>
            </p>
        </div>
    </div>

    <!-- Main scene -->
    <div class="scene" id="scene">
        <div class="card-stage" id="cardStage"></div>
    </div>

    <!-- Reveal cards (shown after all regular cards) -->
    <div class="reveal-card reveal-card-1" id="revealCard1">
        <div class="reveal-card-overlay"></div>
        <div class="reveal-card-label">
            <p>A moment to remember</p>
            <h2>The Journey</h2>
        </div>
        <div class="reveal-nav-hint">Swipe to continue →</div>
    </div>

    <div class="reveal-card reveal-card-2" id="revealCard2">
        <div class="reveal-card-overlay"></div>
        <div class="reveal-card-label">
            <p>With gratitude</p>
            <h2>Together We Grew</h2>
        </div>
        <div class="reveal-nav-hint">Swipe to continue →</div>
    </div>

    <div class="reveal-card reveal-card-3" id="revealCard3">
        <div class="reveal-card-overlay"></div>
        <div class="reveal-card-label">
            <p>Always and always</p>
            <h2>Thank You, Vamshi</h2>
        </div>
    </div>

    <!-- UI chrome -->
    <button class="nav-arrow nav-arrow-left" id="navLeft" aria-label="Previous">‹</button>
    <button class="nav-arrow nav-arrow-right" id="navRight" aria-label="Next">›</button>

    <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="progress-dots" id="progressDots"></div>

    <div class="card-index" id="cardIndex"></div>
    <div class="swipe-hint" id="swipeHint">Swipe or use arrow keys</div>

<script>
/* =============================================
   DATA
   Pattern per "group":  3 images → 3 quotes → 1 video
   Two groups → 2 videos total
   After all regular cards: 3 reveal swipes (background panels)
============================================= */

const images = [
    "1000049780.jpg","1000049768.jpg",
    "1000050494.jpg","1000050496.jpg","1000050498.jpg",
    "1000050500.jpg","1000050502.jpg","1000050504.jpg",
    "1000050506.jpg","1000050508.jpg"
];

const quotes = [
    { text: "Balances deadlines and sanity — most of the time successfully.", author: "Shobha" },
    { text: "Proof that calm thinking can survive our chaos.", author: "Bhavani" },
    { text: "Runs the team so smoothly, we forget how hard it actually is.", author: "Yashwanth" },
    { text: "Turns 'let's see' into 'let's do'.", author: "Kris" },
    { text: "Keeps us aligned, even when our thoughts aren't.", author: "Ganga Mohan" },
    { text: "Handles pressure so well, we barely notice it exists.", author: "Rama Rao" },
    { text: "Knows what's going on… even before we do.", author: "Chakri" },
    { text: "Leads in a way that makes everyone better at what they do.", author: "Harish" },
    { text: "Calm outside, probably debugging us inside.", author: "Sakshi" },
    { text: "Basically the team's WiFi — when things work, it's because of him.", author: "Harsha" },
    { text: "Leads with clarity, even when things aren't.", author: "Naveen" },
    { text: "Creates order without making it feel forced.", author: "Ganesh" }
];

const videos = ["vi1.mp4", "vi2.mp4"]; // two video files
let videoMuted = [false, false];     // track mute state per video

/* Build sequence: [img,img,img, quote,quote,quote, video] x2 */
function buildSequence() {
    const seq = [];
    let imgIdx = 0, quoteIdx = 0, vidIdx = 0;

    while (imgIdx < images.length || quoteIdx < quotes.length) {

        // 3 pairs: Image → Quote
        for (let i = 0; i < 3; i++) {
            if (imgIdx < images.length) {
                seq.push({ type: 'image', src: images[imgIdx++] });
            }
            if (quoteIdx < quotes.length) {
                seq.push({ type: 'quote', ...quotes[quoteIdx++] });
            }
        }

        // After 3 pairs → add 1 video
        if (vidIdx < videos.length) {
            seq.push({ type: 'video', src: videos[vidIdx], vidIdx: vidIdx });
            vidIdx++;
        }
    }

    return seq;
}

const SEQUENCE = buildSequence();
const TOTAL_MAIN = SEQUENCE.length;   // regular cards
const TOTAL_REVEAL = 3;               // reveal swipe cards at the end
const TOTAL = TOTAL_MAIN + TOTAL_REVEAL;

/* Reveal card backgrounds — use your own images/video */
const revealImages = [
    "1775141121.png",  // smallest
    "1775119728955.png",  // medium
    "ud.jpg"   // largest
];
const revealAssets = [
    { type:'image', src: revealImages[0] },
    { type:'image', src: revealImages[1] },
    { type:'image', src: revealImages[2] }
];

/* =============================================
   STATE
============================================= */
let current = 0;
let introShown = false;
let dragStartX = 0, dragging = false;

/* =============================================
   DOM REFS
============================================= */
const introEl    = document.getElementById('introScreen');
const sceneEl    = document.getElementById('scene');
const stageEl    = document.getElementById('cardStage');
const dotsEl     = document.getElementById('progressDots');
const fillEl     = document.getElementById('progressFill');
const indexEl    = document.getElementById('cardIndex');
const hintEl     = document.getElementById('swipeHint');
const navLeft    = document.getElementById('navLeft');
const navRight   = document.getElementById('navRight');
const bgPanel1   = document.getElementById('bgPanel1');
const bgPanel2   = document.getElementById('bgPanel2');
const bgPanel3   = document.getElementById('bgPanel3');
const revealCard1 = document.getElementById('revealCard1');
const revealCard2 = document.getElementById('revealCard2');
const revealCard3 = document.getElementById('revealCard3');

// Small → Medium → Large
const bgPanels = [bgPanel3, bgPanel2, bgPanel1];
const revealCards = [revealCard3, revealCard2, revealCard1];

/* =============================================
   INTRO PARTICLES
============================================= */
function spawnParticles() {
    const container = document.getElementById('introParticles');
    const colors = ['#c9a84c','#a78bfa','#ec4899','#60a5fa','#ffffff'];
    for (let i = 0; i < 40; i++) {
        const el = document.createElement('div');
        el.className = 'particle';
        const size = 2 + Math.random() * 4;
        el.style.cssText = `
            width:${size}px; height:${size}px;
            left:${Math.random()*100}%;
            background:${colors[Math.floor(Math.random()*colors.length)]};
            --drift:${(Math.random()-0.5)*200}px;
            animation-duration:${5 + Math.random()*8}s;
            animation-delay:${Math.random()*6}s;
        `;
        container.appendChild(el);
    }
}

/* =============================================
   POPULATE BG PANELS with blurred assets
============================================= */
function populateBgPanels() {
    revealAssets.forEach((asset, i) => {
        const panel = bgPanels[i];
        if (asset.type === 'image') {
            const img = document.createElement('img');
            img.src = asset.src;
            img.style.cssText = 'width:100%;height:100%;object-fit:cover;';
            panel.appendChild(img);
        } else {
            const vid = document.createElement('video');
            vid.src = asset.src;
            vid.autoplay = true; vid.loop = true; vid.muted = true; vid.playsInline = true;
            vid.style.cssText = 'width:100%;height:100%;object-fit:cover;';
            panel.appendChild(vid);
        }
    });
}

/* Populate reveal cards with same assets */
function populateRevealCards() {
    revealCards.forEach((card, i) => {
        const asset = revealAssets[i];
        if (asset.type === 'image') {
            const img = document.createElement('img');
            img.src = asset.src;
            card.insertBefore(img, card.firstChild);
        } else {
            const vid = document.createElement('video');
            vid.src = asset.src;
            vid.autoplay = true; vid.loop = true; vid.muted = true; vid.playsInline = true;
            card.insertBefore(vid, card.firstChild);
        }
    });
}

/* =============================================
   CARD BUILDER
============================================= */
function buildCard(item) {
    const card = document.createElement('div');
    card.className = 'card inactive';

    if (item.type === 'image') {
        const wrap = document.createElement('div');
        wrap.className = 'card-img-wrap';
        const frame = document.createElement('div');
        frame.className = 'card-img-frame';
        const img = document.createElement('img');
        img.src = item.src;
        img.alt = '';
        img.loading = 'lazy';
        frame.appendChild(img);
        wrap.appendChild(frame);
        card.appendChild(wrap);

    } else if (item.type === 'quote') {
        const inner = document.createElement('div');
        inner.className = 'card-quote-inner';

        const qm = document.createElement('span');
        qm.className = 'quote-mark-top';
        qm.textContent = '\u201C';

        const qt = document.createElement('p');
        qt.className = 'card-quote-text';
        qt.textContent = item.text;

        const div = document.createElement('div');
        div.className = 'card-quote-divider';

        const auth = document.createElement('p');
        auth.className = 'card-quote-author';
        auth.textContent = '— ' + item.author;

        inner.append(qm, qt, div, auth);
        card.appendChild(inner);

    } else if (item.type === 'video') {
        const wrap = document.createElement('div');
        wrap.className = 'card-video-wrap';

        const vid = document.createElement('video');
        vid.src = item.src;
        vid.loop = true;
        vid.playsInline = true;
        vid.muted = false;    // AUDIBLE by default
        vid.preload = 'auto';

        const overlay = document.createElement('div');
        overlay.className = 'video-overlay';

        const label = document.createElement('div');
        label.className = 'video-label';
        label.textContent = 'Memories';

        // Mute toggle button
        const muteBtn = document.createElement('button');
        muteBtn.className = 'mute-btn';
        muteBtn.innerHTML = '🔊';
        muteBtn.setAttribute('aria-label', 'Toggle mute');
        muteBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            vid.muted = !vid.muted;
            videoMuted[item.vidIdx] = vid.muted;
            muteBtn.innerHTML = vid.muted ? '🔇' : '🔊';
        });

        wrap.append(vid, overlay, label, muteBtn);
        card.appendChild(wrap);
    }

    return card;
}

/* =============================================
   CREATE ALL CARDS
============================================= */
let cardEls = [];

function createCards() {
    SEQUENCE.forEach((item, i) => {
        const c = buildCard(item);
        c.dataset.idx = i;
        stageEl.appendChild(c);
        cardEls.push(c);
    });
}

/* =============================================
   PROGRESS DOTS
============================================= */
function createDots() {
    for (let i = 0; i < TOTAL; i++) {
        const d = document.createElement('div');
        d.className = 'dot';
        d.addEventListener('click', () => { if (introShown) goTo(i); });
        dotsEl.appendChild(d);
    }
}

function updateProgress() {
    const dots = dotsEl.querySelectorAll('.dot');
    dots.forEach((d, i) => {
        d.className = 'dot';
        if (i === current) d.classList.add('now');
        else if (i < current) d.classList.add('done');
    });
    fillEl.style.width = ((current / (TOTAL - 1)) * 100) + '%';

    // index label
    if (current < TOTAL_MAIN) {
        indexEl.textContent = (current + 1) + ' / ' + TOTAL_MAIN;
        indexEl.classList.add('show');
    } else {
        indexEl.classList.remove('show');
    }

    navLeft.classList.toggle('show', current > 0);
    navRight.classList.toggle('show', current < TOTAL - 1);
}

/* =============================================
   SHOW / HIDE CARD
============================================= */
let prevIdx = -1;

function showCard(idx, direction /* 'forward'|'back' */) {
    const isReveal = idx >= TOTAL_MAIN;
    const revealSubIdx = idx - TOTAL_MAIN; // 0,1,2

    // ---- hide previous ----
    if (prevIdx >= 0 && prevIdx < TOTAL_MAIN) {
        const prevCard = cardEls[prevIdx];
        prevCard.classList.remove('active','entering-right','entering-left');
        prevCard.classList.add(direction === 'forward' ? 'slide-left' : 'slide-right');
        setTimeout(() => prevCard.classList.add('inactive'), 380);

        // pause video
        const vid = prevCard.querySelector('video');
        if (vid) vid.pause();
    }
    if (prevIdx >= TOTAL_MAIN) {
        const prevRevealIdx = prevIdx - TOTAL_MAIN;
        const prevReveal = revealCards[prevRevealIdx];

        prevReveal.classList.remove('visible');
        prevReveal.classList.add(direction === 'forward' ? 'slide-out-left' : 'slide-out-right');

        setTimeout(() => {
            prevReveal.classList.remove('slide-out-left','slide-out-right');
        }, 600);

        // 🔥 KEY FIX: Re-blur when going BACK
        if (direction === 'back') {
            bgPanels[prevRevealIdx].classList.remove('unblurred');
        }
    }

    // ---- show current ----
    if (!isReveal) {
        const c = cardEls[idx];
        c.classList.remove('inactive','slide-left','slide-right');
        c.classList.add('active', direction === 'forward' ? 'entering-right' : 'entering-left');
        setTimeout(() => c.classList.remove('entering-right','entering-left'), 460);

        // play video
        const vid = c.querySelector('video');
        if (vid) {
            vid.muted = false;
            vid.play().catch(() => { vid.muted = true; vid.play(); });
        }
    } else {
        // reveal card
        const rc = revealCards[revealSubIdx];
        rc.classList.remove('slide-out-left','slide-out-right');
        rc.classList.add('visible');

        // unblur corresponding bg panel
        bgPanels[revealSubIdx].classList.add('unblurred');

        // play video inside reveal card if any
        const vid = rc.querySelector('video');
        if (vid) vid.play().catch(() => {});
    }

    prevIdx = idx;
    updateProgress();
    updateHint(idx);
}

function updateHint(idx) {
    if (idx === 0) {
        hintEl.classList.add('show');
        setTimeout(() => hintEl.classList.remove('show'), 3000);
    } else {
        hintEl.classList.remove('show');
    }
}

/* =============================================
   NAVIGATION
============================================= */
function goTo(idx, direction) {
    if (idx < 0 || idx >= TOTAL) return;
    if (!direction) direction = idx > current ? 'forward' : 'back';
    current = idx;
    showCard(idx, direction);
}

function next() { goTo(current + 1, 'forward'); }
function prev() { goTo(current - 1, 'back'); }

/* =============================================
   DRAG / SWIPE
============================================= */
function onDragStart(e) {
    if (!introShown) return;
    dragging = true;
    dragStartX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;

    const activeCard = current < TOTAL_MAIN ? cardEls[current] : revealCards[current - TOTAL_MAIN];
    if (activeCard) activeCard.style.transition = 'none';
}

function onDragMove(e) {
    if (!dragging || !introShown) return;
    const x = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
    const dx = x - dragStartX;
    const rot = dx * 0.04;

    const activeCard = current < TOTAL_MAIN ? cardEls[current] : revealCards[current - TOTAL_MAIN];
    if (activeCard) activeCard.style.transform = `translateX(${dx}px) rotate(${rot}deg)`;
}

function onDragEnd(e) {
    if (!dragging || !introShown) return;
    dragging = false;
    const x = e.type.includes('mouse') ? e.clientX : (e.changedTouches ? e.changedTouches[0].clientX : dragStartX);
    const dx = x - dragStartX;

    const activeCard = current < TOTAL_MAIN ? cardEls[current] : revealCards[current - TOTAL_MAIN];
    if (activeCard) activeCard.style.transition = '';

    if (dx < -80 && current < TOTAL - 1) { next(); }
    else if (dx > 80 && current > 0)     { prev(); }
    else if (activeCard) {
        activeCard.style.transform = '';
    }
}

/* =============================================
   START EXPERIENCE
============================================= */
function startExperience() {
    if (introShown) return;
    introShown = true;
    introEl.classList.add('hidden');
    sceneEl.classList.add('active');
    hintEl.classList.add('show');
    setTimeout(() => hintEl.classList.remove('show'), 3500);
    goTo(0, 'forward');
}

/* =============================================
   INIT
============================================= */
function init() {
    spawnParticles();
    populateBgPanels();
    populateRevealCards();
    createCards();
    createDots();

    // Events
    introEl.addEventListener('click', startExperience);

    document.addEventListener('mousedown', onDragStart);
    document.addEventListener('mousemove', onDragMove);
    document.addEventListener('mouseup', onDragEnd);
    document.addEventListener('touchstart', onDragStart, { passive:true });
    document.addEventListener('touchmove', onDragMove, { passive:true });
    document.addEventListener('touchend', onDragEnd);

    document.addEventListener('keydown', e => {
        if (!introShown) { if (e.key === 'Enter' || e.key === ' ') startExperience(); return; }
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); next(); }
        if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')  { e.preventDefault(); prev(); }
    });

    navLeft.addEventListener('click',  prev);
    navRight.addEventListener('click', next);

    // Auto-start after 4s if user hasn't interacted
    setTimeout(() => { if (!introShown) startExperience(); }, 4000);
}

window.addEventListener('load', init);
</script>
